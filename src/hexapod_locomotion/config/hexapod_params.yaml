hexapod_locomotion:
  ros__parameters:
    # Boucle de contrôle
    control_rate: 30.0

    # Démarche tripode
    cycle_period: 1.0        # durée d'un cycle de marche (s)
    duty: 0.5                # fraction du cycle en appui (tripode = 0.5)
    step_height: 0.04        # hauteur de levée du pied (m)
    max_stride: 0.12         # enjambée max de sécurité (m)

    # Sécurité / seuils
    cmd_timeout: 0.5         # arrêt si plus de Twist reçu (s)
    lin_deadband: 0.01       # m/s
    ang_deadband: 0.03       # rad/s

    # Pose / repères
    base_height: 0.088       # hauteur du corps pour poser les pieds au sol (m)
    odom_frame: "odom"
    base_frame: "base_link"
